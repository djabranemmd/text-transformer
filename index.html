<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Text Transformer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

            <h1>🔄 Text Transformer</h1>

            <!-- Input Section -->
            <textarea id="inputText"
                placeholder="Write your text here..."></textarea>

            <!-- Buttons Section -->
            <div class="buttons">
                <button onclick="toUpperCaseText()">Uppercase</button>
                <button onclick="toLowerCaseText()">Lowercase</button>
                <button onclick="reverseText()">Reverse</button>
                <button onclick="removeSpaces()">Remove Spaces</button>
            </div>

            <!-- Output Section -->
            <div class="output">
                <h3>Result:</h3>
                <p id="resultText"></p>
            </div>

        </div>

        <script src="script.js"></script>
    </body>
</html>
